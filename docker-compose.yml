# wgmesh control plane with embedded relay — one service, one binary.
#
# Notes before you test:
#   - The server runs plain HTTP here; put Traefik in front for TLS
#     (labels sketched below) or expose 8443 with built-in TLS instead.
#   - With Traefik in front, add --trust-proxy so enrollment records
#     real client IPs instead of the proxy's.
#   - Set RELAY_PUBLIC_IP to the address agents dial for relayed
#     traffic (this host's LAN or public IP).
#   - The default --relay-transport auto prefers QUIC on 51890/udp and
#     falls back to WebSocket on the API port (8080/443). The wider UDP
#     range is only needed by agents forced to --relay-transport udp.
#   - Container firewalls aren't a thing, so --manage-firewall=false;
#     open the mapped ports on the HOST firewall instead.
#   - The agent is included commented out: it needs host networking
#     and NET_ADMIN to create the WireGuard interface; most setups run
#     it directly on the host (see deploy/wgmesh-agent.service).
#
# State lives in a named volume; back up server-data (db + PSK master +
# admin token) — losing the PSK master strands enrolled peers.

services:
  server:
    build:
      context: .
      target: server
    command: >
      --listen 0.0.0.0:8080
      --no-tls
      --manage-firewall=false
      --db /data/mesh.db
      --psk-file /data/mesh-psk.key
      --admin-token-file /data/admin-token
      --relay-embedded
      --relay-host ${RELAY_PUBLIC_IP:?set RELAY_PUBLIC_IP to the address agents dial}
      --relay-port-min 51900
      --relay-port-max 51999
    volumes:
      - server-data:/data
    ports:
      - "8080:8080"
      - "51890:51890/udp"
      # Only needed for agents forced to --relay-transport udp.
      - "51900-51999:51900-51999/udp"
    restart: unless-stopped
    # Behind Traefik instead of the 8080 mapping above (keep the UDP range):
    # labels:
    #   traefik.enable: "true"
    #   traefik.http.routers.wgmesh.rule: Host(`mesh.example.com`)
    #   traefik.http.routers.wgmesh.entrypoints: websecure
    #   traefik.http.routers.wgmesh.tls.certresolver: letsencrypt
    #   traefik.http.services.wgmesh.loadbalancer.server.port: "8080"

  # Standalone relay, only for a separate public-IP host:
  # relay:
  #   build:
  #     context: .
  #     target: relay
  #   command: >
  #     --control 0.0.0.0:8081
  #     --secret-file /data/relay-secret
  #     --port-min 51900
  #     --port-max 51999
  #     --manage-firewall=false
  #   network_mode: host
  #   volumes:
  #     - relay-data:/data
  #   restart: unless-stopped

  # agent:
  #   build:
  #     context: .
  #     target: agent
  #   command: >
  #     --server http://<server-address>:8080
  #     --setup-key ${WGMESH_SETUP_KEY:?}
  #     --key-file /data/wgkey.key
  #   network_mode: host
  #   cap_add:
  #     - NET_ADMIN
  #   volumes:
  #     - agent-data:/data
  #   restart: unless-stopped

volumes:
  server-data:
