name: docker-images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  # Change this if your Gitea container registry uses a different host.
  REGISTRY: gitea.mynetbird.uk
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Test Go packages
        run: go test ./...

      - name: Build Go packages
        run: go build ./...

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Gitea registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: server
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/wgmesh-server:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/wgmesh-server:${{ github.sha }}

      - name: Build and push agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: agent
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/wgmesh-agent:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/wgmesh-agent:${{ github.sha }}

      - name: Build and push relay image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: relay
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/wgmesh-relay:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/wgmesh-relay:${{ github.sha }}

  windows-binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Caching matters here: the Fyne GUI build compiles the whole
      # OpenGL stack with cgo (minutes, cold). act_runner's built-in
      # cache server makes reruns nearly free; if caching is disabled
      # on the runner, setup-go just warns and continues.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # The Fyne GUI needs cgo, hence a mingw-w64 cross compiler; the
      # plain agent.exe stays CGO_ENABLED=0.
      - name: Install mingw-w64 cross compiler
        run: |
          if command -v sudo >/dev/null 2>&1; then SUDO=sudo; else SUDO=; fi
          $SUDO apt-get update
          $SUDO apt-get install -y --no-install-recommends gcc-mingw-w64-x86-64

      - name: Download modules
        run: go mod download

      - name: Build Windows agent binaries
        run: |
          mkdir -p bin
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 \
            go build -trimpath -ldflags "-s -w" -o bin/agent.exe ./cmd/agent
          # -v: the cgo compile of go-gl's generated OpenGL bindings
          # takes minutes and ~1 GB of gcc RSS on a cold cache — show
          # per-package progress so the step doesn't look hung.
          GOOS=windows GOARCH=amd64 CGO_ENABLED=1 CC=x86_64-w64-mingw32-gcc \
            go build -v -trimpath -tags gui -ldflags "-s -w -H windowsgui" -o bin/agent-gui.exe ./cmd/agent

      - name: Upload Windows binaries
        uses: actions/upload-artifact@v3
        with:
          name: windows-agent
          path: |
            bin/agent.exe
            bin/agent-gui.exe

  # Tag pushes (v*) additionally publish a Gitea release with all
  # binaries attached — a stable download page instead of per-run
  # artifacts. Uses the workflow's own token; if release creation 403s
  # on your Gitea version, add a personal token with repo scope as the
  # RELEASE_TOKEN secret.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install mingw-w64 cross compiler and jq
        run: |
          if command -v sudo >/dev/null 2>&1; then SUDO=sudo; else SUDO=; fi
          $SUDO apt-get update
          $SUDO apt-get install -y --no-install-recommends gcc-mingw-w64-x86-64 jq

      - name: Build release binaries
        run: WINDOWS_CC=x86_64-w64-mingw32-gcc ./deploy/build.sh

      - name: Generate checksums
        run: cd bin && sha256sum * > sha256sums.txt

      - name: Create release and upload assets
        env:
          TOKEN: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          API="${{ github.server_url }}/api/v1"
          REPO="${{ github.repository }}"
          TAG="${{ github.ref_name }}"

          body=$(printf 'wgmesh %s — server + agent binaries (linux/amd64 and windows/amd64).\n\nWindows: agent.exe and agent-gui.exe need wintun.dll from https://www.wintun.net next to the executable.' "$TAG")

          # Create the release; if it already exists (job re-run), look
          # up its id instead.
          id=$(curl -sSf -X POST "$API/repos/$REPO/releases" \
                 -H "Authorization: token $TOKEN" -H "Content-Type: application/json" \
                 -d "$(jq -n --arg tag "$TAG" --arg body "$body" \
                        '{tag_name: $tag, name: $tag, body: $body}')" \
               | jq -r .id) \
          || id=$(curl -sSf "$API/repos/$REPO/releases/tags/$TAG" \
                    -H "Authorization: token $TOKEN" | jq -r .id)

          echo "release id: $id"

          for f in bin/*; do
            name=$(basename "$f")
            echo "uploading $name"
            curl -sSf -X POST "$API/repos/$REPO/releases/$id/assets?name=$name" \
              -H "Authorization: token $TOKEN" -F "attachment=@$f" -o /dev/null \
              || echo "  (skipped: asset $name may already exist)"
          done
